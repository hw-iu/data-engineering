name: build-latest
on:
  push:
    branches:
      - '**'
      - '!main'

env:
  registry: ghcr.io

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        image: [consume,enrich, kafka-admin, process, produce, setup]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - run: echo ${{ github.repository }}
      - run: docker build -t ${{ env.registry }}/${{ github.repository }}/${{ matrix.image }}:latest -f container_images/${{ matrix.image }}/Dockerfile container_images/${{ matrix.image }}
      - run: docker push ${{ env.registry }}/${{ github.repository }}/${{ matrix.image }}:latest